<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>

    <div class="container">

        <h2>Đăng ký</h2>
    
    
        <input 
            type="email" 
            id="email" 
            placeholder="Email">
    
    
        <input 
            type="password" 
            id="password" 
            placeholder="Mật khẩu">
    
    
        <button id="registerBtn">
            Đăng ký
        </button>
    
    
        <p id="message"></p>
    
    
    </div>

    <script type="module" src="register.js"></script>
</body>
</html>
