<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Login NCT</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="container">

        <h2>Đăng nhập</h2>
    
        <input 
            type="email" 
            id="email" 
            placeholder="Email">
    
        <input 
            type="password" 
            id="password" 
            placeholder="Mật khẩu">
    
        <button id="loginBtn">
            Đăng nhập
        </button>
        
        <button id="googleLoginBtn">
            Đăng nhập bằng Google
        </button>
    
        <p id="message"></p>
    
    </div>
    <script type="module" src="js/login.js"></script>
</body>
</html>
